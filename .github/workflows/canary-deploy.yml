name: Canary Deployment

on:
  push:
    branches: [main]

concurrency:
  group: canary-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Deploy to staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      staging_url: ${{ steps.set-url.outputs.staging_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set staging URL
        id: set-url
        run: echo "staging_url=${{ vars.STAGING_URL || 'http://staging.fluxapay.internal' }}" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        working-directory: ./fluxapay_backend
        run: docker build -f Dockerfile -t fluxapay-backend:${{ github.sha }} .

      - name: Deploy to staging
        run: |
          echo "Deploying fluxapay-backend:${{ github.sha }} to staging"
          # Replace with your actual deploy command, e.g.:
          # kubectl set image deployment/fluxapay-backend app=fluxapay-backend:${{ github.sha }} --namespace=staging
          # or: ssh deploy@staging "docker pull ... && docker-compose up -d"
          echo "DEPLOY_SHA=${{ github.sha }}" >> $GITHUB_ENV

  # ── Stage 2: Integration tests against staging ──────────────────────────────
  integration-tests-staging:
    name: Integration Tests (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluxapay_staging_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fluxapay_backend/package-lock.json

      - name: Install dependencies
        working-directory: ./fluxapay_backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./fluxapay_backend
        run: npx prisma generate

      - name: Sync database schema
        working-directory: ./fluxapay_backend
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fluxapay_staging_test?schema=public

      - name: Run unit + contract tests
        working-directory: ./fluxapay_backend
        run: npm test && npm run test:contract
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fluxapay_staging_test?schema=public
          JWT_SECRET: staging-ci-jwt-secret
          KMS_PROVIDER: local
          KMS_ENCRYPTION_PASSPHRASE: staging-ci-kms-passphrase
          HD_WALLET_MASTER_SEED: staging-ci-master-seed-32chars-padded!!
          DISABLE_CRON: "true"
          WEBHOOK_SECRET: staging-ci-webhook-secret
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          RESEND_API_KEY: re_test
          SMS_PROVIDER: mock
          STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
          STELLAR_NETWORK_PASSPHRASE: Test SDF Network ; September 2015
          FUNDER_SECRET_KEY: SBXEHJKWF7C7BIFSUGXZE7XKFJ5SP6Y7JGPD4J4TKMX2MQXWQQRF3BSG
          MASTER_VAULT_SECRET_KEY: SDGHCAPDRWTOTBAQT6HJ5KBUZOECD2JEOH6E76NDL4OXNBXIWODLZA4B
          USDC_ISSUER_PUBLIC_KEY: GBVXGET7UCLTTLDZGVWDDMZ7FVLCNZL75GU7BLVPTWUP6UIVYHAY5OAX
          PAYMENT_RATE_LIMIT_PER_MINUTE: "10000"

      - name: Build & start backend (smoke)
        working-directory: ./fluxapay_backend
        run: |
          npm run build
          npm start &
          npx --yes wait-on@9.0.4 http://localhost:3000/health --timeout 60000 --interval 2000
        env:
          NODE_ENV: test
          PORT: 3000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fluxapay_staging_test?schema=public
          JWT_SECRET: staging-ci-jwt-secret
          KMS_PROVIDER: local
          KMS_ENCRYPTION_PASSPHRASE: staging-ci-kms-passphrase
          HD_WALLET_MASTER_SEED: staging-ci-master-seed-32chars-padded!!
          DISABLE_CRON: "true"
          WEBHOOK_SECRET: staging-ci-webhook-secret
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          RESEND_API_KEY: re_test
          SMS_PROVIDER: mock
          STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
          STELLAR_NETWORK_PASSPHRASE: Test SDF Network ; September 2015
          FUNDER_SECRET_KEY: SBXEHJKWF7C7BIFSUGXZE7XKFJ5SP6Y7JGPD4J4TKMX2MQXWQQRF3BSG
          MASTER_VAULT_SECRET_KEY: SDGHCAPDRWTOTBAQT6HJ5KBUZOECD2JEOH6E76NDL4OXNBXIWODLZA4B
          USDC_ISSUER_PUBLIC_KEY: GBVXGET7UCLTTLDZGVWDDMZ7FVLCNZL75GU7BLVPTWUP6UIVYHAY5OAX

      - name: Run API smoke tests against staging
        working-directory: ./fluxapay_backend
        run: npm run test:smoke
        env:
          API_BASE_URL: http://localhost:3000

  # ── Stage 3: Promote to production (only if staging passed) ─────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: integration-tests-staging
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Promoting fluxapay-backend:${{ github.sha }} to production"
          # Replace with your actual production deploy command, e.g.:
          # kubectl set image deployment/fluxapay-backend app=fluxapay-backend:${{ github.sha }} --namespace=production

  # ── Rollback: triggered automatically if staging tests fail ─────────────────
  rollback-staging:
    name: Rollback Staging
    runs-on: ubuntu-latest
    needs: integration-tests-staging
    if: failure()
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Rollback staging to previous image
        run: |
          echo "Staging tests failed — rolling back staging to previous stable image"
          # Replace with your actual rollback command, e.g.:
          # kubectl rollout undo deployment/fluxapay-backend --namespace=staging
          echo "Rollback complete. Production was NOT updated."
